<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Ti ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 400px;
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      color: #ff4b5c;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #333;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ff4b5c;
      color: white;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      background: #ff1e3c;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Para Mi Amor 💖</h1>
    <p id="poema">
      Desde que llegaste a mi vida,
      todo tiene más color,
      como un sueño que no termina,
      como un latido de amor.
    </p>
    <button onclick="cambiarPoema()">Otro poema ✨</button>
  </div>

  <script>
    const poemas = [
      "Eres mi sol en días grises,\nmi calma en la tempestad,\ntu sonrisa es lo que dice\nque todo va a estar bien, de verdad.",
      "Si el mundo se apaga un día,\ny todo deja de brillar,\nbastará con tu mirada\npara volver a empezar.",
      "No sé cómo explicarlo,\npero contigo todo es mejor,\ncomo si el universo entero\nconspirara a nuestro favor."
    ];

    function cambiarPoema() {
      const random = Math.floor(Math.random() * poemas.length);
      document.getElementById("poema").innerText = poemas[random];
    }
  </script>
</body>
</html>
